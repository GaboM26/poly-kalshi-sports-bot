# Polytaoli - 预测市场套利程序配置文件
# 这是配置文件模板，请复制为 config.toml 并填入你的实际凭据

[kalshi]
# Kalshi API Key（从 https://kalshi.com/profile/api 获取）
api_key = "your-kalshi-api-key-here"

# Kalshi API Secret（RSA 私钥）
# 支持 PKCS#1 格式（-----BEGIN RSA PRIVATE KEY-----）
# 或 PKCS#8 格式（-----BEGIN PRIVATE KEY-----）
api_secret = """-----BEGIN RSA PRIVATE KEY-----
YOUR_KALSHI_PRIVATE_KEY_HERE
-----END RSA PRIVATE KEY-----"""

# Kalshi API 基础 URL
base_url = "https://api.elections.kalshi.com/trade-api/v2"

[polymarket]
# Polymarket 配置（Magic Link 用户只需配置这两项）
# 
# 1. 私钥 - 从 https://reveal.magic.link/polymarket 获取
private_key = "0xYOUR_PRIVATE_KEY_HERE"
# 
# 2. Smart Wallet 地址 - 从 polymarket.com/settings 查看（资金存放地址）
wallet_address = "0xYOUR_WALLET_ADDRESS_HERE"
#
# API 凭据会自动派生，无需手动配置

# Gamma API 基础 URL（市场数据）
base_url = "https://gamma-api.polymarket.com"

# CLOB API URL（订单操作）
clob_url = "https://clob.polymarket.com"

# 签名类型（1 = Magic Link 用户，0 = EOA，2 = Gnosis Safe）
signature_type = 1

# 以下字段为自动派生的 API 凭据，留空即可
api_key = ""
api_secret = ""
api_passphrase = ""

[settings]
# 刷新间隔（秒）
refresh_interval = 5

# 最小利润率（百分比）
min_profit_margin = 1.0

# 默认下注金额（美元）
default_bet_amount = 10.0  # Testing phase amount

[auth]
# Web UI 登录认证配置
username = "admin"
password = "admin123"

# JWT 密钥（请修改为随机字符串，至少 32 字符）
secret_key = "your-secret-key-change-this-in-production-min-32-chars-long"

# Token 过期时间（小时）
token_expire_hours = 24
